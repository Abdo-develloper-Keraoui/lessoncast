name: Build LessonCast

on:
  push:
    tags: ['v*']          # run only when a tag like v1.0.0 is pushed
  workflow_dispatch:       # allow manual trigger (for testing)

# Grant the necessary permissions to create releases
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: LessonCast-Windows
          - os: macos-12              # Intel Mac
            name: LessonCast-Mac-Intel
          - os: macos-latest           # ARM Mac (Apple Silicon)
            name: LessonCast-Mac-ARM

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask flask-cors soundfile numpy kokoro pyinstaller

      # Build with PyInstaller – separate commands for Windows vs others
      - name: Build (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          pyinstaller \
            --onedir \
            --name "LessonCast" \
            --add-data "index.html:." \
            --collect-all kokoro \
            --collect-all misaki \
            --hidden-import soundfile \
            --hidden-import flask_cors \
            app.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --onedir --name "LessonCast" --add-data "index.html;." --collect-all kokoro --collect-all misaki --hidden-import soundfile --hidden-import flask_cors app.py

      # Add a simple launcher script (start.sh on macOS/Linux, start.bat on Windows)
      - name: Add launcher (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          cat > dist/LessonCast/start.sh << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          mkdir -p audio_output
          ./LessonCast &
          sleep 3
          open http://localhost:5000 2>/dev/null || xdg-open http://localhost:5000
          EOF
          chmod +x dist/LessonCast/start.sh

      - name: Add launcher (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          @"
          @echo off
          cd /d "%~dp0"
          mkdir audio_output 2>nul
          start "" LessonCast.exe
          timeout /t 3 >nul
          start http://localhost:5000
          "@ | Out-File -FilePath dist\LessonCast\start.bat -Encoding ASCII

      # Package everything into a ZIP archive
      - name: Create ZIP (macOS/Linux)
        if: runner.os != 'Windows'
        run: cd dist && zip -r ../${{ matrix.name }}.zip LessonCast/

      - name: Create ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\LessonCast -DestinationPath ${{ matrix.name }}.zip

      # Upload the ZIP as a workflow artifact (always)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.zip

      # Create a GitHub Release and attach the ZIP (only on tag pushes)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}.zip
          generate_release_notes: true   # optional: auto-generate notes from commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}