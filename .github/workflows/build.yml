name: Build LessonCast

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: LessonCast-Windows
          - os: macos-latest
            name: LessonCast-Mac-ARM

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask flask-cors soundfile numpy kokoro pyinstaller torch --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Pre-download Kokoro model
        run: python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='hexgrad/Kokoro-82M', local_dir='kokoro_model')"

      - name: Build (macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller \
            --onedir \
            --name "LessonCast" \
            --add-data "index.html:." \
            --add-data "kokoro_model:kokoro_model" \
            --collect-all kokoro \
            --collect-all misaki \
            --collect-all language_tags \
            --collect-all espeakng_loader \
            --collect-all addict \
            --collect-all transformers \
            --collect-all huggingface_hub \
            --hidden-import soundfile \
            --hidden-import flask_cors \
            app.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --onedir --name "LessonCast" --add-data "index.html;." --add-data "kokoro_model;kokoro_model" --collect-all kokoro --collect-all misaki --collect-all language_tags --collect-all espeakng_loader --collect-all addict --collect-all transformers --collect-all huggingface_hub --hidden-import soundfile --hidden-import flask_cors app.py

      - name: Add launcher (macOS)
        if: runner.os != 'Windows'
        run: |
          cat > dist/LessonCast/start.sh << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          mkdir -p audio_output
          ./LessonCast &
          APP_PID=$!
          caffeinate -i -w $APP_PID &
          sleep 3
          open http://localhost:5000 2>/dev/null || xdg-open http://localhost:5000
          wait $APP_PID
          EOF
          chmod +x dist/LessonCast/start.sh

      - name: Add launcher (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          @"
          @echo off
          cd /d "%~dp0"
          mkdir audio_output 2>nul
          start "" LessonCast.exe
          timeout /t 3 >nul
          start http://localhost:5000
          start "" /B powershell -WindowStyle Hidden -File "%~dp0keepalive.ps1"
          "@ | Out-File -FilePath dist\LessonCast\start.bat -Encoding ASCII

          @"
          `$wsh = New-Object -ComObject WScript.Shell
          while (`$true) {
              `$wsh.SendKeys('{F15}')
              Start-Sleep -Seconds 59
          }
          "@ | Out-File -FilePath dist\LessonCast\keepalive.ps1 -Encoding UTF8

      - name: Create ZIP (macOS)
        if: runner.os != 'Windows'
        run: cd dist/LessonCast && zip -r ../../${{ matrix.name }}.zip .

      - name: Create ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\LessonCast\* -DestinationPath ${{ matrix.name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}