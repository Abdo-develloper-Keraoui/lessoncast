<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LessonCast</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0c0b09;
  --s1:        #141310;
  --s2:        #1c1a17;
  --s3:        #252220;
  --border:    #302d28;
  --gold:      #d4a843;
  --gold2:     #a07828;
  --amber:     #e8c06a;
  --text:      #ede8df;
  --muted:     #7a736a;
  --dim:       #4a4540;
  --red:       #d96060;
  --waveform:  #d4a84355;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: grid;
  grid-template-columns: 380px 1fr;
  grid-template-rows: auto 1fr auto;
}

/* ─── GRAIN OVERLAY ─── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 999; opacity: 0.6;
}

/* ─── HEADER ─── */
header {
  grid-column: 1 / -1;
  padding: 28px 40px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  background: var(--s1);
}
.logo-mark {
  width: 42px; height: 42px;
  background: var(--gold);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.logo-text h1 {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text);
}
.logo-text p {
  font-size: 11px; color: var(--muted);
  font-family: 'DM Mono', monospace;
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-top: 1px;
}
.status-pill {
  margin-left: auto;
  display: flex; align-items: center; gap: 7px;
  font-family: 'DM Mono', monospace;
  font-size: 11px; color: var(--muted);
  background: var(--s2);
  border: 1px solid var(--border);
  padding: 5px 12px; border-radius: 20px;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--dim);
  transition: background 0.3s;
}
.status-dot.live { background: #5ec47a; box-shadow: 0 0 8px #5ec47a88; }

/* ─── LEFT PANEL ─── */
.panel-left {
  grid-row: 2;
  background: var(--s1);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}

.panel-section {
  padding: 24px 28px;
  border-bottom: 1px solid var(--border);
}
.panel-section:last-child { border-bottom: none; flex: 1; display: flex; flex-direction: column; }

.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 14px;
}

/* Voice selector */
.voice-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.voice-btn {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}
.voice-btn:hover { border-color: var(--gold2); }
.voice-btn.active { border-color: var(--gold); background: #d4a84310; }
.voice-btn .vname {
  font-size: 13px; font-weight: 500; color: var(--text);
  display: block;
}
.voice-btn .vmeta {
  font-size: 10px; color: var(--muted);
  font-family: 'DM Mono', monospace;
  margin-top: 2px; display: block;
}

/* Speed slider */
.speed-row {
  display: flex; align-items: center; gap: 12px;
}
.speed-row input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 3px;
  background: linear-gradient(to right, var(--gold) var(--pct, 50%), var(--s3) var(--pct, 50%));
  border-radius: 2px; outline: none; cursor: pointer;
}
.speed-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold2);
}
.speed-val {
  font-family: 'DM Mono', monospace;
  font-size: 13px; color: var(--amber);
  min-width: 36px; text-align: right;
}

/* Textarea */
textarea {
  flex: 1;
  width: 100%;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; line-height: 1.7;
  padding: 16px;
  resize: none; outline: none;
  transition: border-color 0.2s;
  min-height: 200px;
}
textarea:focus { border-color: var(--gold2); }
textarea::placeholder { color: var(--dim); }

.char-count {
  text-align: right;
  font-family: 'DM Mono', monospace;
  font-size: 10px; color: var(--muted);
  margin-top: 8px;
}

/* ─── RIGHT PANEL ─── */
.panel-right {
  grid-row: 2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 40px;
  gap: 40px;
  background: var(--bg);
  position: relative; overflow: hidden;
}
/* background rings */
.panel-right::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  border: 1px solid #d4a84308;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.panel-right::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  border: 1px solid #d4a84312;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

/* Episode card */
.episode-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px;
  width: 100%;
  max-width: 560px;
  position: relative; z-index: 1;
}
.episode-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 10px;
}
.episode-title {
  font-family: 'Playfair Display', serif;
  font-size: 26px; line-height: 1.3;
  color: var(--text); margin-bottom: 6px;
}
.episode-meta {
  font-size: 12px; color: var(--muted);
  font-family: 'DM Mono', monospace;
  margin-bottom: 28px;
}

/* Waveform */
.waveform {
  height: 60px;
  display: flex; align-items: center; gap: 2px;
  margin-bottom: 24px; overflow: hidden;
}
.wave-bar {
  flex: 1; border-radius: 2px;
  background: var(--waveform);
  transition: background 0.2s, height 0.4s;
  min-height: 3px;
}
.wave-bar.active { background: var(--gold); }
.wave-bar.played { background: var(--gold2); }

/* Progress bar */
.progress-wrap {
  position: relative; height: 4px;
  background: var(--s3); border-radius: 2px;
  cursor: pointer; margin-bottom: 8px;
}
.progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(to right, var(--gold2), var(--gold));
  border-radius: 2px; transition: width 0.1s linear;
}
.progress-time {
  display: flex; justify-content: space-between;
  font-family: 'DM Mono', monospace;
  font-size: 11px; color: var(--muted);
  margin-bottom: 28px;
}

/* Controls */
.controls {
  display: flex; align-items: center; justify-content: center; gap: 20px;
}
.ctrl-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); transition: color 0.15s;
  padding: 8px; border-radius: 8px;
  font-size: 18px;
}
.ctrl-btn:hover { color: var(--text); }
.ctrl-btn.primary {
  width: 56px; height: 56px;
  background: var(--gold);
  color: var(--bg);
  border-radius: 50%; font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.ctrl-btn.primary:hover { background: var(--amber); transform: scale(1.05); }
.ctrl-btn.primary:disabled { background: var(--dim); cursor: not-allowed; transform: none; }

/* Generate button */
.generate-btn {
  width: 100%; max-width: 560px;
  background: var(--gold);
  color: var(--bg);
  border: none; border-radius: 12px;
  padding: 16px 24px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all 0.2s;
  position: relative; z-index: 1;
}
.generate-btn:hover:not(:disabled) { background: var(--amber); transform: translateY(-1px); }
.generate-btn:disabled { background: var(--dim); color: var(--muted); cursor: not-allowed; transform: none; }

/* History */
.history-list {
  max-height: 220px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 8px;
  width: 100%; max-width: 560px;
  position: relative; z-index: 1;
}
.history-list::-webkit-scrollbar { width: 4px; }
.history-list::-webkit-scrollbar-track { background: transparent; }
.history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.history-item {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: border-color 0.15s;
}
.history-item:hover { border-color: var(--gold2); }
.history-item.playing { border-color: var(--gold); }
.history-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px; color: var(--muted);
  min-width: 24px;
}
.history-info { flex: 1; overflow: hidden; }
.history-text {
  font-size: 13px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.history-dur {
  font-family: 'DM Mono', monospace;
  font-size: 10px; color: var(--muted);
  margin-top: 2px;
}
.history-play {
  width: 28px; height: 28px;
  background: var(--s3); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--gold); flex-shrink: 0;
}

/* Generation progress */
.gen-progress-wrap {
  width: 100%; max-width: 560px;
  display: none;
  flex-direction: column;
  gap: 8px;
  position: relative; z-index: 1;
}
.gen-progress-wrap.visible { display: flex; }
.gen-progress-bar-bg {
  height: 6px; background: var(--s3); border-radius: 3px; overflow: hidden;
}
.gen-progress-bar-fill {
  height: 100%; width: 0%;
  background: linear-gradient(to right, var(--gold2), var(--gold));
  border-radius: 3px;
  transition: width 0.4s ease;
}
.gen-progress-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px; color: var(--muted);
  display: flex; justify-content: space-between;
}
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 24px;
  font-size: 13px; color: var(--text);
  opacity: 0; transition: opacity 0.3s;
  z-index: 9999; pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.err { border-color: var(--red); color: var(--red); }

/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 16px; height: 16px;
  border: 2px solid transparent;
  border-top-color: currentColor;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

/* Pulse for waveform when playing */
@keyframes wavePulse {
  0%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(1.6); }
}

/* ─── FOOTER ─── */
footer {
  grid-column: 1 / -1;
  border-top: 1px solid var(--border);
  background: var(--s1);
  padding: 14px 40px;
  display: flex; align-items: center; gap: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 11px; color: var(--muted);
}
footer span { color: var(--gold); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-mark">🎙️</div>
  <div class="logo-text">
    <h1>LessonCast</h1>
    <p>Local TTS · Kokoro Engine</p>
  </div>
  <div class="status-pill">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">connecting…</span>
  </div>
</header>

<!-- LEFT PANEL -->
<aside class="panel-left">

  <!-- Voice -->
  <div class="panel-section">
    <div class="section-label">Voice</div>
    <div class="voice-grid" id="voiceGrid">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Speed -->
  <div class="panel-section">
    <div class="section-label">Speed</div>
    <div class="speed-row">
      <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.05" value="1.0">
      <span class="speed-val" id="speedVal">1.0×</span>
    </div>
  </div>

  <!-- Script -->
  <div class="panel-section">
    <div class="section-label">Lesson Script</div>
    <textarea id="scriptInput"
      placeholder="Paste your lesson script here…

Example:
Today we're going to explore the fundamentals of machine learning. At its core, machine learning is about teaching computers to learn from data without being explicitly programmed for every scenario…"
      maxlength="500000"></textarea>
    <div class="char-count"><span id="charCount">0</span> / 500,000</div>
  </div>

</aside>

<!-- RIGHT PANEL -->
<main class="panel-right">

  <!-- Episode Card -->
  <div class="episode-card">
    <div class="episode-tag">Now Playing</div>
    <div class="episode-title" id="epTitle">Ready to Generate</div>
    <div class="episode-meta" id="epMeta">Paste your script and hit generate</div>

    <!-- Waveform -->
    <div class="waveform" id="waveform">
      <!-- bars injected by JS -->
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-time">
      <span id="timeCurrent">0:00</span>
      <span id="timeDuration">0:00</span>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn" id="rewindBtn" title="Rewind 10s">⏪</button>
      <button class="ctrl-btn primary" id="playBtn" disabled>▶</button>
      <button class="ctrl-btn" id="forwardBtn" title="Forward 10s">⏩</button>
      <button class="ctrl-btn" id="downloadBtn" title="Download audio" disabled style="font-size:16px;">⬇️</button>
    </div>
  </div>

  <!-- Generate -->
  <button class="generate-btn" id="generateBtn">
    <span id="generateIcon">✦</span>
    <span id="generateLabel">Generate Audio</span>
  </button>

  <!-- Generation Progress -->
  <div class="gen-progress-wrap" id="genProgress">
    <div class="gen-progress-label">
      <span id="genProgressText">Generating…</span>
      <span id="genProgressPct">0%</span>
    </div>
    <div class="gen-progress-bar-bg">
      <div class="gen-progress-bar-fill" id="genProgressFill"></div>
    </div>
  </div>

  <!-- History -->
  <div class="history-list" id="historyList"></div>

</main>

<!-- FOOTER -->
<footer>
  Powered by <span>Kokoro-TTS</span> · Running locally on <span>localhost:5000</span>
</footer>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<audio id="audioEl"></audio>

<script>
const API = '';  // same-origin Flask server
let selectedVoice = 'af_heart';
let currentAudio  = null;
let currentFilename = null;
let history = [];
let playingIdx = -1;

// ── Helpers ──────────────────────────────────────────────────────────────
function fmt(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}
function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (err ? ' err' : '');
  setTimeout(() => el.className = 'toast', 2800);
}
function excerpt(t) {
  return t.length > 55 ? t.slice(0,55)+'…' : t;
}

// ── Waveform ─────────────────────────────────────────────────────────────
const wf = document.getElementById('waveform');
const BARS = 60;
let wfHeights = [];
function initWaveform() {
  wf.innerHTML = '';
  wfHeights = [];
  for (let i = 0; i < BARS; i++) {
    const h = 10 + Math.random() * 50;
    wfHeights.push(h);
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    bar.style.height = h + 'px';
    wf.appendChild(bar);
  }
}
function updateWaveform(progress) {
  const bars = wf.querySelectorAll('.wave-bar');
  const cutoff = Math.floor(progress * BARS);
  bars.forEach((b, i) => {
    b.classList.remove('active', 'played');
    if (i < cutoff) b.classList.add('played');
    else if (i === cutoff) b.classList.add('active');
  });
}
function animateWaveform(playing) {
  const bars = wf.querySelectorAll('.wave-bar');
  bars.forEach((b, i) => {
    b.style.animation = playing
      ? `wavePulse ${0.4 + Math.random()*0.6}s ease-in-out ${i*0.02}s infinite`
      : 'none';
    if (!playing) b.style.height = wfHeights[i] + 'px';
  });
}
initWaveform();

// ── Status check ─────────────────────────────────────────────────────────
async function checkStatus() {
  try {
    const r = await fetch(API + '/status');
    const d = await r.json();
    document.getElementById('statusDot').className  = 'status-dot' + (d.loaded ? ' live' : '');
    document.getElementById('statusText').textContent = d.loaded ? 'model ready' : 'model offline';
  } catch {
    document.getElementById('statusDot').className  = 'status-dot';
    document.getElementById('statusText').textContent = 'offline';
  }
}

// ── Voices ────────────────────────────────────────────────────────────────
async function loadVoices() {
  try {
    const r = await fetch(API + '/voices');
    const d = await r.json();
    const grid = document.getElementById('voiceGrid');
    grid.innerHTML = '';
    VOICES_CACHE = d.voices || {};
    const groups = {};
    Object.entries(d.voices).forEach(([id, v]) => {
      const lang = v.lang || 'EN';
      if (!groups[lang]) groups[lang] = [];
      groups[lang].push([id, v]);
    });
    const langLabels = { EN: '🇬🇧 English', FR: '🇫🇷 Français' };
    Object.entries(groups).forEach(([lang, voices]) => {
      const hdr = document.createElement('div');
      hdr.style.cssText = 'grid-column:1/-1;font-family:"DM Mono",monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-top:8px;';
      hdr.textContent = langLabels[lang] || lang;
      grid.appendChild(hdr);
      voices.forEach(([id, v]) => {
        const btn = document.createElement('button');
        btn.className = 'voice-btn' + (id === selectedVoice ? ' active' : '');
        btn.dataset.id = id;
        btn.innerHTML = `<span class="vname">${v.name}</span><span class="vmeta">${v.gender}   ${v.accent}</span>`;
        btn.onclick = () => {
          selectedVoice = id;
          grid.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        };
        grid.appendChild(btn);
      });
    });
  } catch {}
}

// ── Speed slider ──────────────────────────────────────────────────────────
const slider = document.getElementById('speedSlider');
const speedVal = document.getElementById('speedVal');
slider.addEventListener('input', () => {
  speedVal.textContent = parseFloat(slider.value).toFixed(2) + '×';
  const pct = ((slider.value - slider.min) / (slider.max - slider.min)) * 100;
  slider.style.setProperty('--pct', pct + '%');
});

// ── Char counter ──────────────────────────────────────────────────────────
const scriptInput = document.getElementById('scriptInput');
scriptInput.addEventListener('input', () => {
  document.getElementById('charCount').textContent = scriptInput.value.length;
});

// ── Audio player ──────────────────────────────────────────────────────────
const audioEl  = document.getElementById('audioEl');
const playBtn  = document.getElementById('playBtn');
const progFill = document.getElementById('progressFill');
const progWrap = document.getElementById('progressWrap');

audioEl.addEventListener('timeupdate', () => {
  if (!audioEl.duration) return;
  const pct = audioEl.currentTime / audioEl.duration;
  progFill.style.width = (pct * 100) + '%';
  document.getElementById('timeCurrent').textContent = fmt(audioEl.currentTime);
  updateWaveform(pct);
});
audioEl.addEventListener('loadedmetadata', () => {
  document.getElementById('timeDuration').textContent = fmt(audioEl.duration);
});
audioEl.addEventListener('play',  () => { playBtn.textContent = '⏸'; animateWaveform(true); });
audioEl.addEventListener('pause', () => { playBtn.textContent = '▶'; animateWaveform(false); });
audioEl.addEventListener('ended', () => {
  playBtn.textContent = '▶';
  animateWaveform(false);
  progFill.style.width = '100%';
});

playBtn.onclick = () => audioEl.paused ? audioEl.play() : audioEl.pause();

document.getElementById('rewindBtn').onclick  = () => { audioEl.currentTime = Math.max(0, audioEl.currentTime - 10); };
document.getElementById('forwardBtn').onclick = () => { audioEl.currentTime = Math.min(audioEl.duration, audioEl.currentTime + 10); };

progWrap.addEventListener('click', e => {
  if (!audioEl.duration) return;
  const rect = progWrap.getBoundingClientRect();
  audioEl.currentTime = ((e.clientX - rect.left) / rect.width) * audioEl.duration;
});

function loadAudio(url, text, dur, idx) {
  audioEl.src = API + url;
  audioEl.load();
  playBtn.disabled = false;
  currentFilename = url.split('/').pop();   // e.g. "abc123.wav"
  const dlBtn = document.getElementById('downloadBtn');
  dlBtn.disabled = false;
  dlBtn.onclick = () => {
    const a = document.createElement('a');
    a.href = API + '/download/' + currentFilename;
    a.download = '';
    a.click();
  };
  document.getElementById('epTitle').textContent = excerpt(text);
  document.getElementById('epMeta').textContent  = `${fmt(dur)} · ${VOICES_CACHE[selectedVoice]?.name || '—'} · ${parseFloat(slider.value).toFixed(1)}× speed`;
  document.getElementById('timeDuration').textContent = fmt(dur);
  progFill.style.width = '0%';
  document.getElementById('timeCurrent').textContent = '0:00';
  initWaveform();

  // highlight history
  playingIdx = idx;
  document.querySelectorAll('.history-item').forEach((el, i) => {
    el.classList.toggle('playing', i === idx);
  });

  audioEl.play();
}

let VOICES_CACHE = {};

// ── History ───────────────────────────────────────────────────────────────
function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  history.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'history-item' + (i === playingIdx ? ' playing' : '');
    el.innerHTML = `
      <span class="history-num">#${history.length - i}</span>
      <div class="history-info">
        <div class="history-text">${excerpt(item.text)}</div>
        <div class="history-dur">${fmt(item.duration)} · ${item.voice}</div>
      </div>
      <div class="history-play">▶</div>
    `;
    el.onclick = () => loadAudio(item.url, item.text, item.duration, i);
    list.prepend(el);
  });
  // re-render so newest is on top
  list.innerHTML = '';
  [...history].reverse().forEach((item, ri) => {
    const i = history.length - 1 - ri;
    const el = document.createElement('div');
    el.className = 'history-item' + (i === playingIdx ? ' playing' : '');
    el.innerHTML = `
      <span class="history-num">#${ri + 1}</span>
      <div class="history-info">
        <div class="history-text">${excerpt(item.text)}</div>
        <div class="history-dur">${fmt(item.duration)} · ${item.voice}</div>
      </div>
      <div class="history-play">▶</div>
      <a href="${API}/download/${item.url.split('/').pop()}" download
         style="margin-left:6px;font-size:13px;color:var(--muted);text-decoration:none;"
         title="Download" onclick="event.stopPropagation()">⬇️</a>
    `;
    el.onclick = () => loadAudio(item.url, item.text, item.duration, i);
    list.appendChild(el);
  });
}

// ── Generate ──────────────────────────────────────────────────────────────
document.getElementById('generateBtn').onclick = async () => {
  const text = scriptInput.value.trim();
  if (!text) { toast('Please paste a script first!', true); return; }

  const btn        = document.getElementById('generateBtn');
  const icon       = document.getElementById('generateIcon');
  const label      = document.getElementById('generateLabel');
  const progWrap   = document.getElementById('genProgress');
  const progFillEl = document.getElementById('genProgressFill');
  const progText   = document.getElementById('genProgressText');
  const progPct    = document.getElementById('genProgressPct');

  btn.disabled = true;
  icon.innerHTML = '<div class="spinner"></div>';
  label.textContent = 'Generating…';
  progWrap.classList.add('visible');
  progFillEl.style.width = '0%';
  progText.textContent = 'Processing text…';
  progPct.textContent = '0%';

  const startTime = Date.now();

  try {
    // Use fetch + ReadableStream to consume SSE
    const res = await fetch(API + '/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text, voice: selectedVoice, speed: parseFloat(slider.value) })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Server error');
    }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let   buffer  = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let msg;
        try { msg = JSON.parse(line.slice(6)); } catch { continue; }

        if (msg.error) throw new Error(msg.error);

        // Update progress bar
        const pct = msg.pct || 0;
        const elapsed = msg.elapsed || Math.round((Date.now() - startTime) / 1000);
        progFillEl.style.width = pct + '%';
        progPct.textContent    = pct + '%';
        if (msg.info) {
          progText.textContent = msg.info;
        } else if (msg.chunks_total) {
          progText.textContent = `Thread ${msg.chunks_done}/${msg.chunks_total} done   ${elapsed}s elapsed`;
        } else {
          progText.textContent = pct < 95
            ? `Synthesizing… ${elapsed}s elapsed`
            : 'Saving audio file…';
        }

        if (msg.done) {
          progFillEl.style.width = '100%';
          progPct.textContent    = '100%';
          progText.textContent   = `Done in ${msg.elapsed}s ✓`;

          const voiceName = VOICES_CACHE[selectedVoice]?.name || selectedVoice;
          history.push({ text, url: msg.audio_url, duration: msg.duration, voice: voiceName });
          renderHistory();
          loadAudio(msg.audio_url, text, msg.duration, history.length - 1);
          toast(`✓ Generated ${fmt(msg.duration)} in ${msg.elapsed}s`);

          setTimeout(() => progWrap.classList.remove('visible'), 3000);
        }
      }
    }

  } catch(e) {
    toast(e.message || 'Generation failed', true);
    progWrap.classList.remove('visible');
  } finally {
    btn.disabled = false;
    icon.textContent = '✦';
    label.textContent = 'Generate Audio';
  }
};

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  await checkStatus();
  const r = await fetch(API + '/voices').catch(() => null);
  if (r) {
    const d = await r.json();
    VOICES_CACHE = d.voices || {};
  }
  await loadVoices();
}

init();
setInterval(checkStatus, 15000);
</script>
